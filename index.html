<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Clientes</title>
</head>
<body>
    <div id="root">
        <h1>Cadastro de Clientes</h1>
        <table>
            <thead>
                <tr>
                    <th>Nome*</th>
                    <td><input type="text" id="nome" name="nome" required></td>
                    <th>Email*</th>
                    <td><input type="email" id="email" name="email" required></td>
                    <th>Telefone*</th>
                    <td><input type="tel" id="telefone" name="telefone" required></td>
                    <th>Cidade</th>
                    <td><input type="text" id="Cidade" name="endereco"></td>
                    <th> Cep</th>
                    <td><input type="text" id="cep" name="cep"></td>
                    <th></th>
                    <td><button type="button" id="adicionar">Salvar</button></td>
                </tr>
            </thead>
            <tbody>
                
            </tbody>
        </table>
    </div>
</body>
</html>
