<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style.css">
    <title>Cadastro de Clientes</title>
</head>

<body>
    <header class="titulo">
        <h1> Cadastro de Cliente</h1>
    </header>
    <main>
        <section class="formulario">

            <label for="">Pesquisar:</label> 
            <input type="search">
            <form action="">
                <div class="campo-formulario">
                    <label for="nome">Nome Completo*</label>
                    <input type="text" id="nome" placeholder="Digite seu nome">
                </div>
                <div class="campo-formulario">
                    <label for="cpf">CPF*</label>
                    <input type="text" id="CPF" placeholder="Digite seu CPF">
                </div>
                <div class="campo-formulario">
                    <label for="email">E-Mail*</label>
                    <input type="email" id="email" placeholder="Digite seu E-mail">
                </div>
                <div class="campo-formulario">
                    <label for="telefone">Telefone*</label>
                    <input type="tel" id="telefone" placeholder="(  ) - ----.----">
                </div>
                <div class="campo-formulario">
                    <label for="cep">CEP*</label>
                    <input type="text" id="cep" placeholder="-----.--">
                </div>
                <div class="campo-formulario">
                    <label for="cidade">Cidade*</label>
                    <input type="text" id="cidade" placeholder="Cidade">
                </div>
                <div class="campo-formulario">
                    <label for="estado">Estado*</label>
                    <input type="text" id="estado" placeholder="Estado">
                </div>
                <div class="campo-formulario">
                    <label for="endereco">Endreço*</label>
                    <input type="text" id="endereco" placeholder="Endereço">
                </div>
                <div class="campo-formulario">
                    <label for="numero">Número*</label>
                    <input type="number" id="numero" placeholder="Número">
                </div>
                <div class="campo-formulario">
                    <label for="bairro">Bairro*</label>
                    <input type="text" id="bairro" placeholder="Bairro">
                </div>
                <div class="campo-formulario">
                    <label for="complemento">Complemento(Opicional)</label>
                    <input type="text" id="complemento">
                </div>
                <button id="botao" type="submit">Salvar</button>
            </form>
        </section>
        <section class="novocliente">
            <h2>Novo Cliente</h2>
        </section>
        <section class="clientescadastrados">
            <h2>Clientes Cadastrados</h2>
        </section>
    </main>
</body>

</html>
